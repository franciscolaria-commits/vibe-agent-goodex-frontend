<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - VibeShop</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: sans-serif;
            background: #f9fafb;
            color: #333;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .checkout-container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        .checkout-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 8px;
            color: #1a1a1a;
        }

        p {
            color: #666;
            margin-bottom: 24px;
            line-height: 1.5;
        }

        .btn-back {
            display: inline-block;
            background: #4A90D9;
            color: white;
            text-decoration: none;
            padding: 12px 28px;
            border-radius: 8px;
            font-weight: 600;
            transition: opacity 0.2s;
        }

        .btn-back:hover {
            opacity: 0.85;
        }
    </style>
</head>

<body>
    <div class="checkout-container">
        <div class="checkout-icon">🛒</div>
        <h1>Checkout Simulado</h1>
        <p>
            Esta es una página de checkout simulada para el MVP del Vibe Agent.
            En producción, acá iría el flujo real de pago.
        </p>
        <a href="index.html" class="btn-back">← Volver a la tienda</a>
    </div>
</body>

</html>
